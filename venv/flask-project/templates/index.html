<!DOCTYPE html>'
<html lang="en">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
<script src="https://rawcdn.githack.com/openlayers/openlayers.github.io/master/en/v5.3.0/build/ol.js"></script>
<script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
<script src="http://code.jquery.com/jquery-3.5.1.min.js"></script>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/highcharts-more.js"></script>
<script src="https://code.highcharts.com/modules/solid-gauge.js"></script>

<head>
    <meta charset="UTF-8" />
    <title> Flask App </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<script>

const mapId = "{{mapId}}";

function initMap() {
    loadMap(39.134556, -84.515413, 18, mapId);
}

function loadMap(lat, lng, zoomLevel, mapId) {
    console.log("loadMap:", zoomLevel);
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat, lng },
        zoom: zoomLevel,
        mapId: mapId
    });
}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key={{key}}&callback=initMap" async defer></script>


<div class="container">
    <div class="phone-container">
        <div class="screen">
            <div class="header-container">

            </div>


             <div id ="main-container">

                 <div class="app-screen">

                     <div class="button-container">
                         <button onclick="openForm()">Input Location Data</button>
                     </div>

                     <div class="leftbox" id="myForm">
                         <span class="close" onclick="closeForm()">&times;</span>
                         <div id="wrap">
                             <form method="post" id="formElement">
                                 <br>
                                 <label>Enter your home location</label>
                                 <input class="search" name="home" id="home" type="text" placeholder="Search Location..."/>
                                 <br>
                                 <br>
                                 <label>Enter a work location</label>
                                 <input class="search" name="work" id="work" type="text" placeholder="Search Location..."/>
                                 <br>
                                 <br>
                                 <label>Enter a current location</label>
                                 <input class="search" name="current" id="current" type="text" placeholder="Search Location.."/>
                                 <br>
                                 <br>
                                 <label>Enter a search location</label>
                                 <input class="search" name="destination" id="destination" type="text" placeholder="Search Location..."/>
                                 <br>
                                 <br>
                                 <label>Select 4 hour time interval values</label>
                                 <select name="interval" id="interval">
                                     <option value="12AM-11PM">Full day</option>
                                     <option value="12AM-4AM">12AM-4AM</option>
                                     <option value="4AM-8AM">4AM-8AM</option>
                                     <option value="8AM-12PM">8AM-12PM</option>
                                     <option value="12PM-4PM">12PM-4PM</option>
                                     <option value="4PM-8PM">4PM-8PM</option>
                                     <option value="8PM-12AM">8PM-12AM</option>
                                 </select>
                                 <br>
                                 <br>
                                 <label>Select a radius</label>
                                 <div class="grid-size-dropdown-elemnet">
                                     <select name="gridsize" id="gridsize">
                                         <option value="700 meters">700 meters</option>
                                         <option value="750 meters">750 meters</option>
                                         <option value="800 meters">800 meters</option>
                                         <option value="850 meters">850 meters</option>
                                         <option value="900 meters">900 meters</option>
                                         <option value="950 meters">950 meters</option>
                                         <option value="1 kilometer">1 kilometer</option>
                                         <option value="1 mile">1 mile</option>
                                     </select>
                                 </div>
                                 <br>
                                 <input class="button" type="submit" />
                             </form>
                         </div>
                     </div>

                         <div class="map-container">
                             <div id="map"></div>
                         </div>


                         {% block content %}{% endblock %}

                 </div>

             </div>

         </div>

        </div>
    </div>
</div>

<br>

<!-- Display flashed messages -->
{% with messages = get_flashed_messages(with_categories=True) %}
{% if messages %}
<div>
    {% for category, message in messages %}
    <div class="flash-message {{ category }}">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}
{% endwith %}

<script>
    function openForm() {
        console.log("Button is clicked");
        document.getElementById("myForm").style.display = "block";
    }

    function closeForm() {
        console.log("Close Button is clicked");
        document.getElementById("myForm").style.display = "none";
    }
</script>

<script type="text/javascript">
    $(document).on('submit','#formElement',function(e)
       {
      console.log('ajax call');
      e.preventDefault();
      $.ajax({
        type:'POST',
        url:'/',
        data:{
          safe:$("#safe").val(),
          work:$("#work").val(),
          current:$("#current").val(),
          destination:$("#destination").val(),
          interval:$("#interval").val(),
          radius:$("#radius").val()
          unit:$("#unit").val()
        },
        success:function()
        {
          alert('saved');
        }
      })
    });
  </script>

</body>
</html>
