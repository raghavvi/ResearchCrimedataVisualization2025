<script>
var map;
var latsafecoordinate = parseFloat("{{latsafecoordinate}}");
var lonsafecoordinate = parseFloat("{{lonsafecoordinate}}");
var latcurrentcoordinate = parseFloat("{{latcurrentcoordinate}}");
var loncurrentcoordinate = parseFloat("{{loncurrentcoordinate}}");
var latworkcoordinate = parseFloat("{{latworkcoordinate}}");
var lonworkcoordinate = parseFloat("{{lonworkcoordinate}}");
var latdestinationcoordinate = parseFloat("{{latdestinationcoordinate}}");
var londestinationcoordinate = parseFloat("{{londestinationcoordinate}}");
var radius = parseFloat("{{radius}}");

var middle_element_current_count = parseFloat("{{middle_element_current_count}}");
var middle_element_safe_count = parseFloat("{{middle_element_safe_count}}");
var middle_element_work_count = parseFloat("{{middle_element_work_count}}");
var middle_element_destination_count = parseFloat("{{middle_element_destination_count}}");
const currentLocation = "{{currentaddress}}";
const safeLocation = "{{safeaddress}}";
const workLocation = "{{workaddress}}";
const destinationLocation = "{{destinationaddress}}"
let currentArray = [];
let safeArray = [];
let workArray = [];
let destinationArray = [];
let locationType = "current";
var rectangles = [];
var maxValue = parseFloat("{{maxgridelement}}");

function updatedMap() {
	var latitude = 39.134556;
	var longitude = -84.515413;
	var mapProp = {
		center: new google.maps.LatLng(latitude, longitude),
		zoom: 17,
	};
	map = new google.maps.Map(document.getElementById("map"), mapProp);
  }


document.getElementById("location").addEventListener("change", function () {
    var selectedValue = this.value;

    const latLngCoordinates = {
        current: { lat: latcurrentcoordinate, lng: loncurrentcoordinate },
        safe: { lat: latsafecoordinate, lng: lonsafecoordinate },
        work: { lat: latworkcoordinate, lng: lonworkcoordinate },
        destination: { lat: latdestinationcoordinate, lng: londestinationcoordinate }
    };

    const heatmapPaths = {
        current: "/static/data/heatmap/heatmap_data_current.csv",
        safe: "/static/data/heatmap/heatmap_data_safe.csv",
        work: "/static/data/heatmap/heatmap_data_work.csv",
        destination: "/static/data/heatmap/heatmap_data_destination.csv"
    };

    const geoBounds = {
        current: {
            north: JSON.parse("{{ current_north_list | tojson }}"),
            south: JSON.parse("{{ current_south_list | tojson }}"),
            west: JSON.parse("{{ current_west_list | tojson }}"),
            east: JSON.parse("{{ current_east_list | tojson }}")
        },
        safe: {
            north: JSON.parse("{{ safe_north_list | tojson }}"),
            south: JSON.parse("{{ safe_south_list | tojson }}"),
            west: JSON.parse("{{ safe_west_list | tojson }}"),
            east: JSON.parse("{{ safe_east_list | tojson }}")
        },
        work: {
            north: JSON.parse("{{ work_north_list | tojson }}"),
            south: JSON.parse("{{ work_south_list | tojson }}"),
            west: JSON.parse("{{ work_west_list | tojson }}"),
            east: JSON.parse("{{ work_east_list | tojson }}")
        },
        destination: {
            north: JSON.parse("{{ destination_north_list | tojson }}"),
            south: JSON.parse("{{ destination_south_list | tojson }}"),
            west: JSON.parse("{{ destination_west_list | tojson }}"),
            east: JSON.parse("{{ destination_east_list | tojson }}")
        }
    };

    const colOrder = ['A', 'B', 'C', 'D', 'E'];
    const rowOrder = ['v5', 'v4', 'v3', 'v2', 'v1'];

    if (selectedValue in heatmapPaths) {
        const latLng = latLngCoordinates[selectedValue];
        const heatmapPath = heatmapPaths[selectedValue];
        const boundsLists = geoBounds[selectedValue];

        // Zoom in
        map.setCenter(latLng);
        map.setZoom(16);

        // Clear previous rectangles
        rectangles.forEach(rect => rect.setMap(null));
        rectangles = [];

        d3.csv(heatmapPath).then(function (data) {
            data.forEach(function (d) {
                d.countlist = +d.countlist;
                d.col = d.rows;
                d.row = d.cols;
            });

            data.sort((a, b) => {
                var rowDiff = rowOrder.indexOf(a.row) - rowOrder.indexOf(b.row);
                return rowDiff !== 0
                    ? rowDiff
                    : colOrder.indexOf(a.col) - colOrder.indexOf(b.col);
            });

            var countlist = data.map(d => d.countlist);
            var centerList = data.map(d => d.centerlist);
            var maxValue = d3.max(countlist);

            for (let i = 0; i < boundsLists.north.length; i++) {
                var value = countlist[i];
                var center = centerList[i];
                var normalizedValue = Math.min(value / maxValue, 1);
                var fillColor = d3.interpolatePurples(normalizedValue);

                var bounds = {
                    north: boundsLists.north[i],
                    south: boundsLists.south[i],
                    east: boundsLists.east[i],
                    west: boundsLists.west[i]
                };

                var rectangle = new google.maps.Rectangle({
                    strokeColor: '#000',
                    strokeWeight: 2,
                    fillColor: fillColor,
                    map: map,
                    bounds: bounds
                });

                if (center === "True") {
                    rectangle.setOptions({ strokeWeight: 4, strokeColor: '#0077B6', zIndex: 999 });
                }

                rectangles.push(rectangle);

                new google.maps.Marker({
                    position: {
                        lat: (bounds.north + bounds.south) / 2,
                        lng: (bounds.east + bounds.west) / 2
                    },
                    map: map,
                    label: {
                        text: value.toString(),
                        color: "black",
                        fontWeight: "bold",
                        fontSize: "14px"
                    },
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 0
                    }
                });
            }

            // Draw Legend
            var legendWidth = 120;
            var legendHeight = 10;

            d3.select("#legend").selectAll("*").remove();

            var svg = d3.select("#legend")
                .append("svg")
                .attr("width", legendWidth + 30)
                .attr("height", 30);

            var defs = svg.append("defs");
            var linearGradient = defs.append("linearGradient")
                .attr("id", "linear-gradient");

            linearGradient
                .attr("x1", "0%")
                .attr("y1", "0%")
                .attr("x2", "100%")
                .attr("y2", "0%");

            linearGradient.selectAll("stop")
                .data([
                    { offset: "0%", color: d3.interpolatePurples(0) },
                    { offset: "100%", color: d3.interpolatePurples(1) }
                ])
                .enter().append("stop")
                .attr("offset", d => d.offset)
                .attr("stop-color", d => d.color);

            svg.append("rect")
                .attr("x", 10)
                .attr("y", 0)
                .attr("width", legendWidth)
                .attr("height", legendHeight)
                .style("fill", "url(#linear-gradient)")
                .style("stroke", "black");

            svg.append("text")
                .attr("x", 10)
                .attr("y", legendHeight + 12)
                .attr("font-size", "10px")
                .attr("text-anchor", "start")
                .text("1");

            svg.append("text")
                .attr("x", legendWidth + 10)
                .attr("y", legendHeight + 12)
                .attr("font-size", "10px")
                .attr("text-anchor", "end")
                .text(maxValue);

        }).catch(function (error) {
            console.error("Error loading the CSV file:", error);
        });

        locationType = selectedValue;
    }
});


window.addEventListener("load", function () {
  const locationSelect = document.getElementById("location");
  locationSelect.dispatchEvent(new Event("change")); // Trigger the event
});

let isHistogram1 = true; // Toggle flag

// Initial chart render
addHistogram();
document.getElementById("toggle-chart").addEventListener("click", () => {
	d3.select("#histogram svg")
		.transition()
		.duration(300)
		.style("opacity", 0)
		.remove();

	setTimeout(() => {
		if (isHistogram1) {
			document.getElementById("toggle-text").innerText = "View details in linear distribution";
			addHistogram2();
		} else {
			document.getElementById("toggle-text").innerText = "View details in logarithmic distribution";
			addHistogram();
		}
		isHistogram1 = !isHistogram1;
	}, 300);
});

function addHistogram() {
	let currentValue = parseFloat("{{ middle_element_current_count }}");
	var interval = "{{interval}}";
	var address = "{{currentaddress}}";
	var grid = JSON.parse("{{ dial_list | tojson }}");
	var maxElement = Math.max(...grid);
	console.log("dial_list grid", grid);
	console.log("maxElement", maxElement);
	const binSize = 10;
	const tickCount = Math.ceil(maxElement / binSize);
	console.log("tickCount", tickCount);

	document.getElementById("histogram-title").innerHTML = `<strong>Distribution of hazardous crimes from ${interval} over 13 years</strong>`;

	const margin = { top: 28, right: 20, bottom: 48, left: 52 },
		width = 350 - margin.left - margin.right,
		height = 235 - margin.top - margin.bottom;

	const svg = d3.select("#histogram")
		.append("svg")
		.attr("width", width + margin.left + margin.right)
		.attr("height", height + margin.top + margin.bottom)
		.append("g")
		.attr("transform", `translate(${margin.left},${margin.top})`);

	const x = d3.scaleLinear().domain([0, maxElement]).range([0, width]);
	svg.append("g")
		.attr("transform", `translate(0, ${height})`)
		.call(d3.axisBottom(x))
		.selectAll("text")
		.style("text-anchor", "end")
		.attr("dx", "-0.8em")
		.attr("dy", "0.15em")
		.attr("transform", "rotate(-40)");

	const histogram = d3.histogram()
		.value(d => d)
		.domain(x.domain())
		.thresholds(x.ticks(tickCount));
	const bins = histogram(grid);

	const y = d3.scaleLinear().range([height, 0]).domain([1, d3.max(bins, d => d.length)]);
	svg.append("g").call(d3.axisLeft(y).ticks(5, d3.format(",.0f")));

	const tooltip = d3.select("#histogram")
		.append("div")
		.style("opacity", 0)
		.attr("class", "tooltip")
		.style("background-color", "#466c9e")
		.style("color", "white")
		.style("border-radius", "5px")
		.style("width", "55px")
		.style("height", "15px")
		.style("font-size", ".575rem")
		.style("text-align", "center")
		.style("line-height", "15px")
		.style("position", "absolute");

	const showTooltip = function(event, d) {
		tooltip.transition().duration(100).style("opacity", 1);
		tooltip.html(d.length)
			.style("left", (event.pageX - 100) + "px")
			.style("top", (event.pageY - 30) + "px");
	};
	const moveTooltip = function(event, d) {
		const tooltipWidth = parseFloat(tooltip.style("width"));
		const tooltipHeight = parseFloat(tooltip.style("height"));
		tooltip.style("left", (event.pageX - tooltipWidth / 2) + "px")
			.style("top", (event.pageY - tooltipHeight - 10) + "px");
	};
	const hideTooltip = function() {
		tooltip.transition().duration(100).style("opacity", 0);
	};

	svg.selectAll("rect")
		.data(bins)
		.join("rect")
		.attr("class", "bar")
		.attr("x", 1)
		.attr("transform", d => `translate(${x(d.x0)}, ${y(d.length)})`)
		.attr("width", d => x(d.x1) - x(d.x0) - 0.1)
		.attr("height", d => height - y(d.length))
		.attr("fill", d => {
			if (d.x0 < 50) return "green";
			else if (d.x0 <= 100) return "yellow";
			else return "orange";
		})
		.on("mouseover", showTooltip)
		.on("mousemove", moveTooltip)
		.on("mouseleave", hideTooltip);

	const binsWithOne = bins.filter(d => d.length === 1);
	svg.selectAll("circle")
		.data(binsWithOne)
		.enter()
		.append("circle")
		.attr("cx", d => x((d.x0 + d.x1) / 2))
		.attr("cy", height)
		.attr("r", 2)
		.style("fill", d => {
			if (d.x0 < 50) return "green";
			else if (d.x0 <= 100) return "yellow";
			else return "orange";
		})
		.style("stroke", "black")
		.on("mouseover", showTooltip)
		.on("mousemove", moveTooltip)
		.on("mouseleave", hideTooltip);

	svg.append("text")
		.attr("text-anchor", "end")
		.attr("x", width)
		.attr("y", height + margin.top)
		.attr("font-size", "10px")
		.text("Crime Counts");

	svg.append("text")
		.attr("text-anchor", "middle")
		.attr("transform", "rotate(-90)")
		.attr("x", -height / 2)
		.attr("y", -margin.left + 10)
		.attr("font-size", "10px")
		.text("Frequency");

	const legend = svg.append("g")
		.attr("class", "legend")
		.attr("transform", `translate(${width - 100}, -10)`);

	legend.append("rect").attr("x", 0).attr("y", 0).attr("width", 15).attr("height", 15).style("fill", "green");
	legend.append("text").attr("x", 20).attr("y", 12).attr("font-size", "12px").text("safe");

	legend.append("rect").attr("x", 0).attr("y", 20).attr("width", 15).attr("height", 15).style("fill", "yellow");
	legend.append("text").attr("x", 20).attr("y", 32).attr("font-size", "12px").text("moderate");

	legend.append("rect").attr("x", 0).attr("y", 40).attr("width", 15).attr("height", 15).style("fill", "orange");
	legend.append("text").attr("x", 20).attr("y", 52).attr("font-size", "12px").text("heavy");

	svg.selectAll("rect")
		.data(bins)
		.filter(d => currentValue >= d.x0 && currentValue < d.x1)
		.style("fill", "blue")
		.style("fill-opacity", 0.5);

	const legend2 = svg.append("g")
		.attr("class", "legend")
		.attr("transform", `translate(0, ${height + 35})`);

	legend2.append("rect")
		.attr("x", 0)
		.attr("y", 0)
		.attr("width", 15)
		.attr("height", 15)
		.style("fill", "blue")
		.style("fill-opacity", 0.5);

	legend2.append("text")
		.attr("x", 20)
		.attr("y", 12)
		.attr("font-size", "12px")
		.text("Current location");
}

	legend.append("rect").attr("x", 0).attr("y", 20).attr("width", 15).attr("height", 15).style("fill", "yellow");
	legend.append("text").attr("x", 20).attr("y", 32).attr("font-size", "12px").text("moderate");

	legend.append("rect").attr("x", 0).attr("y", 40).attr("width", 15).attr("height", 15).style("fill", "orange");
	legend.append("text").attr("x", 20).attr("y", 52).attr("font-size", "12px").text("heavy");

	svg.selectAll("rect")
		.data(bins)
		.filter(d => currentValue >= d.x0 && currentValue < d.x1)
		.style("fill", "blue")
		.style("fill-opacity", 0.5);

	const legend2 = svg.append("g")
		.attr("class", "legend")
		.attr("transform", `translate(0, ${height + 35})`);

	legend2.append("rect")
		.attr("x", 0)
		.attr("y", 0)
		.attr("width", 15)
		.attr("height", 15)
		.style("fill", "blue")
		.style("fill-opacity", 0.5);

	legend2.append("text")
		.attr("x", 20)
		.attr("y", 12)
		.attr("font-size", "12px")
		.text("Current location");
}
