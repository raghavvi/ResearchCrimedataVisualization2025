    }
};

const colOrder = ['A', 'B', 'C', 'D', 'E'];
const rowOrder = ['v5', 'v4', 'v3', 'v2', 'v1'];

function drawHeatmap(selectedValue, colorscaleValue) {
    if (!(selectedValue in heatmapPaths)) return;

    const latLng = latLngCoordinates[selectedValue];
    const heatmapPath = heatmapPaths[selectedValue];
    const boundsLists = geoBounds[selectedValue];

    // Zoom in
    map.setCenter(latLng);
    map.setZoom(16);

    // Clear previous rectangles
    rectangles.forEach(rect => rect.setMap(null));
    rectangles = [];

    // Clear previous markers
    markers.forEach(marker => marker.setMap(null));
    markers = [];

    d3.csv(heatmapPath).then(function (data) {
        data.forEach(function (d) {
            d.countlist = +d.countlist;
            d.col = d.rows;
            d.row = d.cols;
        });

        data.sort((a, b) => {
            var rowDiff = rowOrder.indexOf(a.row) - rowOrder.indexOf(b.row);
            return rowDiff !== 0
                ? rowDiff
                : colOrder.indexOf(a.col) - colOrder.indexOf(b.col);
        });

        var countlist = data.map(d => d.countlist);
        var centerList = data.map(d => d.centerlist);

        // --- color scale selection ---
        let maxValue, minValue;
        if (colorscaleValue === "city") {
            maxValue = parseFloat("{{maxgridelement}}");
            minValue = 1;
        } else {
            maxValue = d3.max(countlist);
            minValue = d3.min(countlist);
        }

        console.log("heatmap maxValue (" + colorscaleValue + "):", maxValue);

        // Draw grid
        for (let i = 0; i < boundsLists.north.length; i++) {
            var value = countlist[i];
            var center = centerList[i];
            var normalizedValue = Math.min(value / maxValue, 1);
            var fillColor = d3.interpolatePurples(normalizedValue);

            var bounds = {
                north: boundsLists.north[i],
                south: boundsLists.south[i],
                east: boundsLists.east[i],
                west: boundsLists.west[i]
            };

            var rectangle = new google.maps.Rectangle({
                strokeColor: '#000',
                strokeWeight: 2,
                fillColor: fillColor,
                fillOpacity: 1.0,
                map: map,
                bounds: bounds
            });

            if (center === "True") {
                rectangle.setOptions({ strokeWeight: 4, strokeColor: '#0077B6', zIndex: 999 });
            }

            rectangles.push(rectangle);

            let marker = new google.maps.Marker({
                position: {
                    lat: (bounds.north + bounds.south) / 2,
                    lng: (bounds.east + bounds.west) / 2
                },
                map: map,
                label: {
                    text: value.toString(),
                    color: "black",
                    fontWeight: "bold",
                    fontSize: "14px"
                },
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 0
                }
            });
            markers.push(marker);

        }

        // --- Draw Legend ---
        var legendWidth = 120;
        var legendHeight = 10;

        d3.select("#legend").selectAll("*").remove();

        var svg = d3.select("#legend")
            .append("svg")
            .attr("width", legendWidth + 30)
            .attr("height", 30);

        var defs = svg.append("defs");
        var linearGradient = defs.append("linearGradient")
            .attr("id", "linear-gradient");

        linearGradient
            .attr("x1", "0%")
            .attr("y1", "0%")
            .attr("x2", "100%")
            .attr("y2", "0%");

        linearGradient.selectAll("stop")
            .data([
                { offset: "0%", color: d3.interpolatePurples(0) },
                { offset: "100%", color: d3.interpolatePurples(1) }
            ])
            .enter().append("stop")
            .attr("offset", d => d.offset)
            .attr("stop-color", d => d.color);

        svg.append("rect")
            .attr("x", 10)
            .attr("y", 0)
            .attr("width", legendWidth)
            .attr("height", legendHeight)
            .style("fill", "url(#linear-gradient)")
            .style("stroke", "black");

        // left label
        svg.append("text")
            .attr("x", 10)
            .attr("y", legendHeight + 12)
            .attr("font-size", "10px")
            .attr("text-anchor", "start")
            .text(minValue);

        // right label
        svg.append("text")
            .attr("x", legendWidth + 10)
            .attr("y", legendHeight + 12)
            .attr("font-size", "10px")
            .attr("text-anchor", "end")
            .text(maxValue);

    }).catch(function (error) {
        console.error("Error loading the CSV file:", error);
    });
}

	const histogram = d3.histogram()

     const showTooltip = function(event,d) {

         .transition()

         .html(d.length)
         .style("left", (event.x)/2-100 + "px")
         .style("top", (event.y)/2 + "px")
     }

     const moveTooltip = function(event,d) {

       .style("right", (event.x)/2 + 45 + "px")
       .style("top", (event.y)/2 + "px")
     }

	const hideTooltip = function() {
		tooltip.transition().duration(100).style("opacity", 0);
	};

	svg.selectAll("rect")
		.data(bins)
		.join("rect")
		.attr("class", "bar")
		.attr("x", 1)

	const binsWithOne = bins.filter(d => d.length === 1);
	svg.selectAll("circle")

		.enter()

		.attr("transform", `translate(0, ${height})`)

		.selectAll("text")
		.style("text-anchor", "end")
		.attr("dx", "-0.8em")
		.attr("dy", "0.15em")
		.attr("transform", "rotate(-40)");

	const histogram = d3.histogram()
		.value(d => d)
		.domain(x.domain())
		.thresholds(x.ticks(tickCount));
	const bins = histogram(grid);

	const y = d3.scaleLog().range([height, 0]).domain([1, d3.max(bins, d => d.length)]);
	svg.append("g").call(d3.axisLeft(y).ticks(5, d3.format(",.0f")));

	const tooltip = d3.select("#histogram")
		.append("div")
		.style("opacity", 0)
		.attr("class", "tooltip")
		.style("background-color", "#466c9e")
		.style("color", "white")
		.style("border-radius", "5px")
		.style("width", "55px")
		.style("height", "15px")
		.style("font-size", ".575rem")
		.style("text-align", "center")
		.style("line-height", "15px")
		.style("position", "absolute");

     const showTooltip = function(event,d) {
       tooltip
         .transition()
         .duration(100)
         .style("opacity", 1)
       tooltip
         .html(d.length)
         .style("left", (event.x)/2-100 + "px")
         .style("top", (event.y)/2 + "px")
     }

     const moveTooltip = function(event,d) {
       tooltip
       .style("right", (event.x)/2 + 45 + "px")
       .style("top", (event.y)/2 + "px")
     }

	const hideTooltip = function() {
		tooltip.transition().duration(100).style("opacity", 0);
	};

	svg.selectAll("rect")
		.data(bins)
		.join("rect")
		.attr("class", "bar")
		.attr("x", 1)
		.attr("transform", d => `translate(${x(d.x0)}, ${y(d.length)})`)
		.attr("width", d => x(d.x1) - x(d.x0) - 0.1)
		.attr("height", d => height - y(d.length))
		.attr("fill", d => {
			if (d.x0 < 50) return "green";
			else if (d.x0 <= 100) return "yellow";
			else return "orange";
		})
		.on("mouseover", showTooltip)
		.on("mousemove", moveTooltip)
		.on("mouseleave", hideTooltip);

	const binsWithOne = bins.filter(d => d.length === 1);
	svg.selectAll("circle")
		.data(binsWithOne)
		.enter()
		.append("circle")
		.attr("cx", d => x((d.x0 + d.x1) / 2))
		.attr("cy", height)
		.attr("r", 2)
		.style("fill", d => {
			if (d.x0 < 50) return "green";
			else if (d.x0 <= 100) return "yellow";
			else return "orange";
		})
		.style("stroke", "black")
		.on("mouseover", showTooltip)
		.on("mousemove", moveTooltip)
		.on("mouseleave", hideTooltip);

    svg.append("text")

		.attr("x", -height / 2)
		.attr("y", -margin.left + 10)

		.text("Frequency");

	const legend = svg.append("g")
		.attr("class", "legend")
		.attr("transform", `translate(${width - 100}, 50)`);

	legend.append("rect").attr("x", 0).attr("y", 0).attr("width", 15).attr("height", 15).style("fill", "green");
	legend.append("text").attr("x", 20).attr("y", 12).attr("font-size", "12px").text("safe");

        .attr("y1", 0)
        .attr("y2", height)
        .attr("stroke", "blue")
        .attr("stroke-width", 2)
        .attr("stroke-dasharray", "4,2"); // dashed line for visibility

        // Add legend entry for the dashed line
        const legend2 = svg.append("g")

        legend2.append("line")

        // Legend text based on location type
        legend2.append("text")

function createAreaChart() {
    var current_counts = JSON.parse("{{ current_time_counts | tojson }}");
    var current_years = JSON.parse("{{ current_time_years | tojson }}");

    var work_counts = JSON.parse("{{ work_time_counts | tojson }}");
    var work_years = JSON.parse("{{ work_time_years | tojson }}");

    var safe_counts = JSON.parse("{{ safe_time_counts | tojson }}");
    var safe_years = JSON.parse("{{ safe_time_years | tojson }}");

    var destination_counts = JSON.parse("{{ destination_time_counts | tojson }}");
    var destination_years = JSON.parse("{{ destination_time_years | tojson }}");

    const areaChartSelections = {
        current: { counts: current_counts, years: current_years, label:  areaCurrent },
        work: { counts: work_counts, years: work_years, label: areaWork },
        safe: { counts: safe_counts, years: safe_years, label: areaSafe },
        destination: { counts: destination_counts, years: destination_years, label: areaDestination }
    };

    var interval = "{{ interval }}";

    // Initial chart render
    renderChart("current");

    // Update chart on dropdown change
    document.getElementById("location").addEventListener("change", function () {
        renderChart(this.value);
    });

    function renderChart(selectedValue) {
        var data = areaChartSelections[selectedValue];

        Highcharts.chart('container2', {
            chart: {
                type: 'area'
            },
            title: {
                text: 'Crime counts for ' + data.label + ' within ' + radius + ' ' + units +
                      ' for interval ' + interval + ' over years',
                useHTML: true,
                style: {
                    fontSize: '12px'
                }
            },
            xAxis: {
                categories: data.years,
                title: { text: 'Year' }
            },
            yAxis: {
                title: { text: 'Crime Count' }
            },
            series: [{
                name: 'Crimes',
                data: data.counts
            }]
        });
    }
}
